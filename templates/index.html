<!DOCTYPE html>
<html>
<head> </head>
<body>
    <h1>Snapdf</h1>
    <p>Welcome to SnapPdf!</p>
    <h2>UPLOAD PDF</h2>
<form action="/convert" method="post" enctype="multipart/form-data">
    <input type="file" name="pdf" required onchange="console.log(this.files)">
    <select name="format">
        <option value="jpg">JPG</option>
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
    </select>
    <button type="submit">Convert</button>
</form>
</body>
</html>
<button id="downloadAllBtn">Download All</button>

<script>
    const downloadUrl = "{{ url_for('download_all') }}"; // Flask generates the correct URL
    document.getElementById('downloadAllBtn').addEventListener('click', function() {
        window.location.href = downloadUrl; // browser navigates to the Flask route
    });
</script>
